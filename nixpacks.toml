# nixpacks.toml
# Tells Railway to set up both Python and Node environments,
# and installs the system libraries Chrome needs to run headlessly.

providers = ["python", "node"]

[phases.setup]
aptPkgs = [
    "fonts-liberation",
    "libatk-bridge2.0-0",
    "libatk1.0-0",
    "libcups2",
    "libgbm1",
    "libgtk-3-0",
    "libnspr4",
    "libnss3",
    "libx11-xcb1",
    "libxcomposite1",
    "libxdamage1",
    "libxfixes3",
    "libxrandr2",
    "libxss1",
    "libxtst6",
    "xdg-utils"
]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "npm install"
]

[start]
cmd = "gunicorn 'src:create_app()' --bind 0.0.0.0:$PORT"